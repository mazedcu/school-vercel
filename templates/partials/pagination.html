{% if page_obj.has_other_pages %}
<div class="pagination" style="margin-top: 1.5rem; display: flex; justify-content: center; gap: 0.5rem;">
    {% if page_obj.has_previous %}
        <a href="?page=1{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}" class="btn btn-sm" style="background:var(--surface);border:1px solid var(--border);color:var(--text);">&laquo; First</a>
        <a href="?page={{ page_obj.previous_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}" class="btn btn-sm" style="background:var(--surface);border:1px solid var(--border);color:var(--text);">Prev</a>
    {% else %}
        <span class="btn btn-sm disabled" style="background:var(--bg);border:1px solid var(--border);color:var(--text-muted);cursor:not-allowed;">&laquo; First</span>
        <span class="btn btn-sm disabled" style="background:var(--bg);border:1px solid var(--border);color:var(--text-muted);cursor:not-allowed;">Prev</span>
    {% endif %}

    <span class="btn btn-sm active" style="background:var(--primary);border:1px solid var(--primary);color:#fff;pointer-events:none;">
        Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
    </span>

    {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}" class="btn btn-sm" style="background:var(--surface);border:1px solid var(--border);color:var(--text);">Next</a>
        <a href="?page={{ page_obj.paginator.num_pages }}{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}" class="btn btn-sm" style="background:var(--surface);border:1px solid var(--border);color:var(--text);">Last &raquo;</a>
    {% else %}
        <span class="btn btn-sm disabled" style="background:var(--bg);border:1px solid var(--border);color:var(--text-muted);cursor:not-allowed;">Next</span>
        <span class="btn btn-sm disabled" style="background:var(--bg);border:1px solid var(--border);color:var(--text-muted);cursor:not-allowed;">Last &raquo;</span>
    {% endif %}
</div>
{% endif %}
