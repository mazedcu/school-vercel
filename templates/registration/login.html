{% extends "base.html" %}
{% block title %}Login - OpDevSM{% endblock %}
{% block content %}
<div style="display:flex;justify-content:center;align-items:center;min-height:80vh;">
    <div style="width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:2.5rem;box-shadow:0 8px 32px rgba(0,0,0,0.08);">
        <div style="text-align:center;margin-bottom:2rem;">
            <h2 style="font-size:1.75rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">OpDevSM</h2>
            <p style="color:var(--text-muted);font-size:0.85rem;margin-top:0.25rem;">School Management System</p>
        </div>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {% if form.errors %}
            <div class="msg msg-error" style="margin-bottom:1rem;">Invalid username or password. Please try again.</div>
            {% endif %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" autofocus autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;padding:0.75rem;">Sign In</button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>
{% endblock %}
