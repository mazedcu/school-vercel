{% extends "base.html" %}
{% block title %}Password Reset Complete - OpDevSM{% endblock %}
{% block content %}
<div style="display:flex;justify-content:center;align-items:center;min-height:80vh;">
    <div style="width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:2.5rem;box-shadow:0 8px 32px rgba(0,0,0,0.08);text-align:center;">
        <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
        <h2 style="font-size:1.5rem;font-weight:700;color:var(--success);margin-bottom:0.75rem;">Password Reset Successful!</h2>
        <p style="color:var(--text-muted);font-size:0.9rem;line-height:1.6;margin-bottom:1.5rem;">
            Your password has been changed successfully. You can now sign in with your new password.
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary btn-block" style="padding:0.75rem;">Sign In Now</a>
    </div>
</div>
{% endblock %}
